<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00FF88"/>
      <stop offset="35%"  stop-color="#00CC66"/>
      <stop offset="70%"  stop-color="#004422"/>
      <stop offset="100%" stop-color="#001A0D"/>
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#050F07"/>
      <stop offset="100%" stop-color="#03070D"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Subtle ambient glow behind eyes -->
  <ellipse cx="256" cy="256" rx="200" ry="70" fill="#00FF88" opacity="0.04" filter="url(#softglow)"/>

  <!-- Goggle bridge bar -->
  <rect x="108" y="242" width="296" height="28" rx="14" fill="#003319" opacity="0.7"/>
  <rect x="108" y="249" width="296" height="14" rx="7"  fill="#00FF88"  opacity="0.15"/>

  <!-- LEFT EYE -->
  <!-- outer ring glow -->
  <circle cx="142" cy="256" r="68" fill="none" stroke="#00FF88" stroke-width="2" opacity="0.2" filter="url(#glow)"/>
  <!-- lens body -->
  <circle cx="142" cy="256" r="58" fill="url(#eyeGrad)"/>
  <!-- ring detail -->
  <circle cx="142" cy="256" r="54" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.4"/>
  <circle cx="142" cy="256" r="44" fill="none" stroke="#00FF88" stroke-width="1"   opacity="0.25"/>
  <!-- bright pupil -->
  <circle cx="142" cy="256" r="22" fill="#00FF88" filter="url(#glow)"/>
  <circle cx="142" cy="256" r="12" fill="#AAFFDD"/>
  <!-- specular -->
  <circle cx="132" cy="246" r="5"  fill="#FFFFFF" opacity="0.5"/>

  <!-- MIDDLE EYE (smaller, Splinter Cell has 3 lenses with center one slightly offset or same size) -->
  <circle cx="256" cy="256" r="68" fill="none" stroke="#00FF88" stroke-width="2" opacity="0.2" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="58" fill="url(#eyeGrad)"/>
  <circle cx="256" cy="256" r="54" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="44" fill="none" stroke="#00FF88" stroke-width="1"   opacity="0.25"/>
  <circle cx="256" cy="256" r="22" fill="#00FF88" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="12" fill="#AAFFDD"/>
  <circle cx="246" cy="246" r="5"  fill="#FFFFFF" opacity="0.5"/>

  <!-- RIGHT EYE -->
  <circle cx="370" cy="256" r="68" fill="none" stroke="#00FF88" stroke-width="2" opacity="0.2" filter="url(#glow)"/>
  <circle cx="370" cy="256" r="58" fill="url(#eyeGrad)"/>
  <circle cx="370" cy="256" r="54" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.4"/>
  <circle cx="370" cy="256" r="44" fill="none" stroke="#00FF88" stroke-width="1"   opacity="0.25"/>
  <circle cx="370" cy="256" r="22" fill="#00FF88" filter="url(#glow)"/>
  <circle cx="370" cy="256" r="12" fill="#AAFFDD"/>
  <circle cx="360" cy="246" r="5"  fill="#FFFFFF" opacity="0.5"/>

  <!-- Bottom text -->
  <text x="256" y="400" font-family="monospace" font-size="36" font-weight="bold"
        fill="#00FF88" text-anchor="middle" opacity="0.6" letter-spacing="8">AGENT</text>
</svg>
